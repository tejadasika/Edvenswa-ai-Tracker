<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edvenswa AI Tracker</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font: 13px/1.4 system-ui, sans-serif;
        background: #09090b;
        color: #e4e4e7;
      }
      h1 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
      .sub { color: #71717a; font-size: 11px; margin-bottom: 12px; }
      .row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 0; border-top: 1px solid #27272a;
      }
      .row:first-of-type { border-top: 0; }
      .label { color: #a1a1aa; font-size: 11px; }
      .value { font-size: 12px; font-weight: 500; }
      .pill {
        display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 10px;
      }
      .ok { background: #14532d; color: #86efac; }
      .warn { background: #78350f; color: #fcd34d; }
      .err { background: #7f1d1d; color: #fca5a5; }
      button {
        width: 100%; margin-top: 4px; padding: 7px;
        background: #18181b; color: #e4e4e7; border: 1px solid #3f3f46;
        border-radius: 4px; font-size: 12px; cursor: pointer;
      }
      button:hover { background: #27272a; }
      button.danger { color: #fca5a5; border-color: #7f1d1d; }
      .actions { display: flex; gap: 6px; margin-top: 10px; }
      .actions button { flex: 1; margin: 0; }
      a { color: #818cf8; font-size: 11px; }
      .err-text { color: #fca5a5; font-size: 11px; margin-top: 6px; word-break: break-all; }
      .switch-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 0 8px; border-top: 1px solid #27272a; margin-top: 4px;
      }
      .switch-row .label { color: #e4e4e7; font-size: 12px; font-weight: 500; }
      .switch {
        position: relative; width: 36px; height: 20px;
        background: #3f3f46; border-radius: 999px; cursor: pointer;
        transition: background 120ms ease; border: 0; padding: 0;
      }
      .switch[aria-checked="true"] { background: #4f46e5; }
      .switch[disabled] { opacity: 0.5; cursor: default; }
      .switch::after {
        content: ""; position: absolute; top: 2px; left: 2px;
        width: 16px; height: 16px; border-radius: 999px; background: #fff;
        transition: transform 120ms ease;
      }
      .switch[aria-checked="true"]::after { transform: translateX(16px); }
    </style>
  </head>
  <body>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <img src="edven-image.png" alt="Edven logo" style="width:30px;height:30px;border-radius:8px;object-fit:cover;" />
      <div>
        <h1>Edvenswa AI Tracker</h1>
        <div class="sub" id="sub">Loading…</div>
      </div>
    </div>

    <div class="switch-row">
      <span class="label">Tracking</span>
      <button id="trackSwitch" class="switch" role="switch" aria-checked="false" disabled></button>
    </div>

    <div class="row"><span class="label">Status</span><span class="value" id="status">—</span></div>
    <div class="row"><span class="label">Server</span><span class="value" id="server">—</span></div>
    <div class="row"><span class="label">Queued events</span><span class="value" id="queue">—</span></div>
    <div class="row"><span class="label">Last flush</span><span class="value" id="lastFlush">—</span></div>

    <div class="err-text" id="lastError"></div>

    <div class="actions">
      <button id="flush">Flush now</button>
    </div>
    <p style="margin: 8px 0 0; font-size: 10px; color: #71717a; line-height: 1.4;">
      The extension only reports time-on-site for third-party AI tabs.
      It never reads your prompts or page content.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
